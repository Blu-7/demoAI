<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma Render</title>
  <style>
    :root {
      --frame-size: 736px;
      --bg: #0f172a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: Arial, sans-serif;
      padding: 24px;
    }

    .frame {
      width: min(var(--frame-size), calc(100vw - 48px));
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      background: #111827;
    }

    .frame img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <main class="frame" data-name="meo 1" data-node-id="1:3">
    <img
      src="https://www.figma.com/api/mcp/asset/ae0d30cf-92a8-4f90-a600-f45e06da7c64"
      alt="Cat looking at ocean wind turbines"
    >
  </main>
</body>
</html>
